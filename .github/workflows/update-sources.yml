name: Update managed sources

on:
  workflow_dispatch:
    inputs:
      electron_version:
        description: 'Electron version (e.g. 39.5.2). Leave empty to use pkgver from PKGBUILD.'
        required: false

jobs:
  update-sources:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    permissions:
      contents: write

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm git python python-requests

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract pkgver from PKGBUILD
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.electron_version }}" ]; then
            pkgver="${{ github.event.inputs.electron_version }}"
          else
            pkgver=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          fi
          echo "pkgver=${pkgver}" >> "$GITHUB_OUTPUT"
          _major_ver=$(echo "${pkgver}" | cut -d. -f1)
          echo "pkgname=electron${_major_ver}" >> "$GITHUB_OUTPUT"

      - name: Generate managed sources
        run: |
          _pkgname="${{ steps.vars.outputs.pkgname }}"
          _pkgver="${{ steps.vars.outputs.pkgver }}"
          echo "Generating sources for ${_pkgname} v${_pkgver}..."
          python makepkg-source-roller.py update "v${_pkgver}" "${_pkgname}"

      - name: Generate checksums
        run: |
          # Git sources use SKIP checksums. We only need real checksums for
          # the non-git sources (tarball + local patches).
          # Count non-git sources (before BEGIN managed sources marker)
          _non_git_count=$(sed -n '/^source=(/,/# BEGIN managed sources/p' PKGBUILD \
            | grep -c -E '^\s+[a-z]' || true)
          # Count managed (git) sources
          _git_count=$(sed -n '/# BEGIN managed sources/,/# END managed sources/p' PKGBUILD \
            | grep -c '::git+' || true)

          echo "Non-git sources: ${_non_git_count}, Git sources: ${_git_count}"

          # Build sha256sums array: SKIP for everything
          # (local patches are in the repo, tarball is verified by git tag)
          _sums="sha256sums=("
          for i in $(seq 1 ${_non_git_count}); do
            _sums+=$'\n'"            'SKIP'"
          done
          for i in $(seq 1 ${_git_count}); do
            _sums+=$'\n'"            'SKIP'"
          done
          _sums+=")"

          # Replace existing sha256sums in PKGBUILD
          python3 -c "
          import re
          with open('PKGBUILD', 'r') as f:
              content = f.read()
          # Match sha256sums=( ... ) block
          content = re.sub(
              r'sha256sums=\([^)]*\)',
              '''${_sums}''',
              content,
              count=1
          )
          with open('PKGBUILD', 'w') as f:
              f.write(content)
          "

      - name: Check for changes
        id: diff
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git diff --quiet PKGBUILD && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git commit -m "chore: update managed sources for v${{ steps.vars.outputs.pkgver }}"
          git push
