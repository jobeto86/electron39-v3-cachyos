name: Publish to AUR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 41.0.2). Leave empty to read from aur/PKGBUILD'
        required: false
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm git openssh pacman-contrib fakeroot base-devel

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve version and artifact URL
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            VERSION="${VERSION%-v3}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(grep '^pkgver=' aur/PKGBUILD | cut -d= -f2)"
          fi

          ARTIFACT_URL="https://github.com/jobeto86/electron39-v3-cachyos/releases/download/v${VERSION}-v3/electron41-${VERSION}-1-x86_64.pkg.tar.zst"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_url=${ARTIFACT_URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"
          echo "Artifact URL: ${ARTIFACT_URL}"

      - name: Download artifact and compute sha256
        id: checksum
        run: |
          curl -fSL -o /tmp/electron.pkg.tar.zst "${{ steps.meta.outputs.artifact_url }}"
          SHA256="$(sha256sum /tmp/electron.pkg.tar.zst | cut -d' ' -f1)"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA256}"
          rm -f /tmp/electron.pkg.tar.zst

      - name: Patch aur/PKGBUILD with version and checksum
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SHA256="${{ steps.checksum.outputs.sha256 }}"
          cd aur

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          echo "--- Patched PKGBUILD ---"
          grep -E '^(pkgver|pkgrel|sha256sums)=' PKGBUILD

      - name: Setup SSH for AUR
        run: |
          mkdir -p /root/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> /root/.ssh/known_hosts 2>/dev/null

      - name: Clone AUR repo
        run: |
          git config --global user.name "Roberto Ramirez"
          git config --global user.email "${{ secrets.AUR_EMAIL }}"
          git clone ssh://aur@aur.archlinux.org/electron41-v3-bin.git /tmp/aur-pkg || \
            (mkdir -p /tmp/aur-pkg && cd /tmp/aur-pkg && git init && git remote add origin ssh://aur@aur.archlinux.org/electron41-v3-bin.git)

      - name: Copy files and generate .SRCINFO
        run: |
          cp aur/PKGBUILD /tmp/aur-pkg/PKGBUILD
          cp aur/electron41-v3-bin.install /tmp/aur-pkg/electron41-v3-bin.install
          cd /tmp/aur-pkg

          useradd -m builder 2>/dev/null || true
          chown -R builder:builder /tmp/aur-pkg
          su builder -c "makepkg --printsrcinfo > .SRCINFO"

      - name: Push to AUR
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          git config --global --add safe.directory /tmp/aur-pkg
          cd /tmp/aur-pkg
          git add PKGBUILD .SRCINFO electron41-v3-bin.install

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Update electron41-v3-bin to ${VERSION}"
          git push origin master
